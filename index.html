<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Battambang:wght@300;400;700&family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", "Battambang", sans-serif;
        }
        html {
            font-size: clamp(14px, 1.1vw, 18px);
        }

        body {
            padding-top: 80px;
        }

        /* header */
        .navbar_item {
            transition: 0.3s;
        }

        .navbar_item:hover {
            text-decoration: underline;
        }

        /* Logo responsive */
        .logo {
            width: clamp(120px, 10vw, 150px);
            height: auto;
        }

        /* Navbar text responsive */
        .navbar-nav .nav-link {
            font-size: clamp(14px, 1vw, 18px);
        }

        /* for PC */
        @media (min-width:768px) {
            .navbar-group {
                border-radius: 20px;
                transition: 0.3s;
                margin-left: 10px;
            }

            .navbar-group:hover {
                border: 1px solid #ccc;
                transform: scale(1.03);
            }
        }

        /* Login button */
        .navbar-login {
            background: blue;
            border-radius: 10px;
            font-size: clamp(14px, 1vw, 18px);
        }

        .navbar-login a {
            color: white !important;
        }

        /* for mobile  */
        @media (max-width:767px) {
            .navbar-nav {
                text-align: center;
            }

            .navbar-group {
                margin: 5px 0;
            }

            .navbar-login {
                width: 100%;
            }
        }

        .contact {
            width: 100%;
            border-radius: 5px;
            overflow: hidden;
        }

        .contact_item {
            transition: 0.3s;
        }

        .contact_item:hover {
            background: black;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="header.html">
                <img class="logo" src="image/logoForCombodiaEconomy.png" alt="">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                <li class="nav-item navbar-group">
                        <a class="nav-link navbar_item" href="#">ទំព័រដើម</a>
                    </li>
                    <li class="nav-item navbar-group">
                        <a class="nav-link navbar_item" href="#">ព័ត៍មានថ្មីៗ</a>
                    </li>
                    <li class="nav-item navbar-group">
                        <a class="nav-link navbar_item" href="#">អាជីវកម្ម</a>
                    </li>
                    <li class="nav-item navbar-group">
                        <a class="nav-link navbar_item" href="#">បច្ចេកវិទ្យា</a>
                    </li>
                    <li class="nav-item navbar-group">
                        <a class="nav-link navbar_item" href="#">កីឡា</a>
                    </li>
                    <li class="nav-item dropdown navbar-group">
                        <a class="nav-link dropdown-toggle navbar_item" href="#" data-bs-toggle="dropdown">
                            ទំនាក់ទំនង
                        </a>
                        <ul class="dropdown-menu p-2">
                            <li class="contact"><a class="dropdown-item contact_item"
                                    href="https://www.facebook.com/share/18PbbZ5Bbs/">Facebook</a></li>
                            <li class="contact"><a class="dropdown-item contact_item"
                                    href="https://t.me/ENVannak">Telegram</a></li>
                            <li class="contact"><a class="dropdown-item contact_item"
                                    href="mailto:envannak093@gmail.com">Email</a></li>
                        </ul>
                    </li>
                    <li class="nav-item navbar-login ms-md-3">
                        <a class="nav-link" href="form.html">Log in</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

</body>

</html>
